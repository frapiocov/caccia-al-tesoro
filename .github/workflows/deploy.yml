name: Deploy Pages (Static + Jekyll Subfolder)

on:
  push:
    branches: ["main"] # Cambia in "master" se il tuo branch principale si chiama così
  workflow_dispatch: # Permette di forzare il deploy manualmente dall'interfaccia di GitHub

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Configura Ruby e Jekyll
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2' # Versione stagna e supportata di Ruby
          bundler-cache: true # Velocizza i deploy successivi se usi un Gemfile

      - name: Configura GitHub Pages
        uses: actions/configure-pages@v4

      - name: Crea cartella di staging temporanea
        run: mkdir _site_dist

      - name: Build del progetto Jekyll (Sottocartella)
        run: |
          cd leggere-morra
          bundle install
          bundle exec jekyll build --destination ../_site_dist/leggere-morra
          cd ..

      - name: Copia i file statici della Root nella cartella finale
        # Copia index.html, style.css e le altre risorse statiche (es. immagini, PDF) senza sovrascrivere la sottocartella
        run: |
          rsync -av --progress . _site_dist --exclude=leggere-morra --exclude=_site_dist --exclude=.github --exclude=.git

      - name: Carica l'artefatto per GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site_dist'

      - name: Deploy su GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4